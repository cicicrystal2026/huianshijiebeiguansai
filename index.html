<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>2026美加墨世界杯线下观赛招募</title>
    <link rel="preload" as="image" href="./assets/poster.webp?v=20260707-4" type="image/webp" />
    <link rel="stylesheet" href="./styles.css?v=20260707-4" />
  </head>
  <body>
    <main class="page" aria-label="2026美加墨世界杯线下观赛招募">
      <section class="poster" aria-label="活动报名海报">
        <form class="signup-form" id="signupForm" novalidate>
          <fieldset class="session-picker" aria-label="选择报名场次">
            <legend class="sr-only">选择报名场次，可多选</legend>
            <label class="session-choice session-01">
              <input type="checkbox" name="sessions" value="01｜7月11日｜1/4决赛｜凌晨3:00" />
              <span aria-hidden="true"></span>
              <span class="sr-only">7月11日 1/4决赛 凌晨3:00</span>
            </label>
            <label class="session-choice session-02">
              <input type="checkbox" name="sessions" value="02｜7月12日｜1/4决赛｜凌晨5:00" />
              <span aria-hidden="true"></span>
              <span class="sr-only">7月12日 1/4决赛 凌晨5:00</span>
            </label>
            <label class="session-choice session-03">
              <input type="checkbox" name="sessions" value="03｜7月16日｜半决赛｜凌晨3:00" />
              <span aria-hidden="true"></span>
              <span class="sr-only">7月16日 半决赛 凌晨3:00</span>
            </label>
            <label class="session-choice session-04">
              <input type="checkbox" name="sessions" value="04｜7月19日｜三四名决赛｜凌晨5:00" />
              <span aria-hidden="true"></span>
              <span class="sr-only">7月19日 三四名决赛 凌晨5:00</span>
            </label>
            <label class="session-choice session-05">
              <input type="checkbox" name="sessions" value="05｜7月20日｜总决赛｜凌晨3:00" />
              <span aria-hidden="true"></span>
              <span class="sr-only">7月20日 总决赛 凌晨3:00</span>
            </label>
          </fieldset>

          <label class="field field-name">
            <span class="sr-only">用户名</span>
            <input id="username" name="username" type="text" autocomplete="name" placeholder="请输入用户名" maxlength="20" required />
          </label>

          <label class="field field-phone">
            <span class="sr-only">手机号</span>
            <input id="phone" name="phone" type="tel" inputmode="numeric" autocomplete="tel" placeholder="请输入手机号" maxlength="11" required />
          </label>

          <button class="submit-btn" id="submitBtn" type="submit" aria-label="确认报名"></button>
          <p class="form-message" id="formMessage" aria-live="polite"></p>
        </form>

        <section class="success-panel" id="successPanel" hidden>
          <h1>报名成功</h1>
          <p id="successText"></p>
          <button id="resetBtn" type="button">继续报名</button>
        </section>
      </section>
    </main>

    <script src="./config.js?v=20260707-4"></script>
    <script src="./app.js?v=20260703-7"></script>
  </body>
</html>
